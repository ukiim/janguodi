<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#D0E8C0"/>
  <!-- Garden bed -->
  <rect x="200" y="160" width="400" height="280" fill="#8B6B4A" rx="8" opacity="0.3"/>
  <!-- Grid lines -->
  <line x1="200" y1="230" x2="600" y2="230" stroke="#6B5340" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="300" x2="600" y2="300" stroke="#6B5340" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="370" x2="600" y2="370" stroke="#6B5340" stroke-width="1.5" opacity="0.4"/>
  <line x1="333" y1="160" x2="333" y2="440" stroke="#6B5340" stroke-width="1.5" opacity="0.4"/>
  <line x1="466" y1="160" x2="466" y2="440" stroke="#6B5340" stroke-width="1.5" opacity="0.4"/>
  <!-- Plants in grid cells -->
  <!-- Row 1 -->
  <circle cx="266" cy="195" r="20" fill="#5DAE4B" opacity="0.8"/>
  <circle cx="400" cy="195" r="18" fill="#7BC86C" opacity="0.8"/>
  <circle cx="533" cy="195" r="22" fill="#4A9A3A" opacity="0.8"/>
  <!-- Row 2 -->
  <circle cx="266" cy="265" r="18" fill="#7BC86C" opacity="0.8"/>
  <circle cx="400" cy="265" r="22" fill="#4A9A3A" opacity="0.8"/>
  <circle cx="533" cy="265" r="20" fill="#5DAE4B" opacity="0.8"/>
  <!-- Row 3 -->
  <circle cx="266" cy="335" r="22" fill="#4A9A3A" opacity="0.8"/>
  <circle cx="400" cy="335" r="20" fill="#5DAE4B" opacity="0.8"/>
  <circle cx="533" cy="335" r="18" fill="#7BC86C" opacity="0.8"/>
  <!-- Row 4 -->
  <circle cx="266" cy="405" r="20" fill="#7BC86C" opacity="0.8"/>
  <circle cx="400" cy="405" r="18" fill="#4A9A3A" opacity="0.8"/>
  <circle cx="533" cy="405" r="22" fill="#5DAE4B" opacity="0.8"/>
  <!-- Label -->
  <text x="400" y="510" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#2D5A1E">텃밭 가꾸기</text>
</svg>
