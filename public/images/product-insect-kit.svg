<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#D5E0F0"/>
  <!-- Magnifying glass -->
  <circle cx="380" cy="260" r="80" fill="none" stroke="#4A6FA5" stroke-width="8"/>
  <circle cx="380" cy="260" r="70" fill="#E8F0FF" opacity="0.5"/>
  <line x1="438" y1="318" x2="510" y2="390" stroke="#4A6FA5" stroke-width="10" stroke-linecap="round"/>
  <!-- Small bug inside magnifier -->
  <ellipse cx="380" cy="255" rx="18" ry="24" fill="#5D8A3C"/>
  <ellipse cx="380" cy="235" rx="12" ry="12" fill="#5D8A3C"/>
  <line x1="370" y1="230" x2="358" y2="215" stroke="#5D8A3C" stroke-width="2"/>
  <line x1="390" y1="230" x2="402" y2="215" stroke="#5D8A3C" stroke-width="2"/>
  <circle cx="358" cy="213" r="3" fill="#5D8A3C"/>
  <circle cx="402" cy="213" r="3" fill="#5D8A3C"/>
  <!-- Bug legs -->
  <line x1="368" y1="248" x2="352" y2="255" stroke="#5D8A3C" stroke-width="2"/>
  <line x1="368" y1="260" x2="352" y2="267" stroke="#5D8A3C" stroke-width="2"/>
  <line x1="392" y1="248" x2="408" y2="255" stroke="#5D8A3C" stroke-width="2"/>
  <line x1="392" y1="260" x2="408" y2="267" stroke="#5D8A3C" stroke-width="2"/>
  <!-- Label -->
  <text x="400" y="470" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#2A4A7A">곤충 관찰 키트</text>
</svg>
