  <line x1="400" y1="230" x2="370" y2="260" stroke="#3D7A2E" stroke-width="1.5"/>
  <line x1="400" y1="230" x2="430" y2="260" stroke="#3D7A2E" stroke-width="1.5"/>
  <line x1="400" y1="280" x2="365" y2="310" stroke="#3D7A2E" stroke-width="1.5"/>
  <line x1="400" y1="280" x2="435" y2="310" stroke="#3D7A2E" stroke-width="1.5"/>
