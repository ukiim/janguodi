  <circle cx="500" cy="310" r="35" fill="#E85040" stroke="#C03020" stroke-width="1.5"/>
  <path d="M490 278 Q500 270 510 278" fill="#3D7A2E"/>
  <!-- Label -->
  <text x="400" y="460" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#2D5A1E">유기농 채소</text>
