<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="10" y="10" width="380" height="280" rx="20" ry="20" fill="#E0C8E8"/>
  <!-- Jar body -->
  <rect x="155" y="100" width="90" height="120" rx="10" fill="#E8E0F0"/>
  <rect x="155" y="100" width="90" height="120" rx="10" stroke="#B090C0" stroke-width="2" fill="none"/>
  <!-- Jar neck -->
  <rect x="170" y="85" width="60" height="20" rx="3" fill="#E8E0F0"/>
  <rect x="170" y="85" width="60" height="20" rx="3" stroke="#B090C0" stroke-width="2" fill="none"/>
  <!-- Lid -->
  <rect x="165" y="78" width="70" height="14" rx="5" fill="#8B6914"/>
  <rect x="165" y="78" width="70" height="14" rx="5" stroke="#6B5010" stroke-width="1" fill="none"/>
  <!-- Jam level inside jar -->
  <rect x="160" y="140" width="80" height="75" rx="8" fill="#7B2D8E" opacity="0.7"/>
  <!-- Jam label -->
  <rect x="168" y="150" width="64" height="40" rx="5" fill="#FFF8F0"/>
  <text x="200" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#5C1A6E">오디잼</text>
  <text x="200" y="183" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8B6914">MULBERRY</text>
  <!-- Decorative berries around jar -->
  <circle cx="130" cy="160" r="6" fill="#4A1259"/>
  <circle cx="120" cy="152" r="5" fill="#5C1A6E"/>
  <circle cx="125" cy="168" r="5" fill="#6B2080"/>
  <circle cx="270" cy="155" r="6" fill="#4A1259"/>
  <circle cx="280" cy="163" r="5" fill="#5C1A6E"/>
  <circle cx="275" cy="147" r="5" fill="#6B2080"/>
  <!-- Berry leaves -->
  <ellipse cx="115" cy="145" rx="8" ry="5" fill="#6B9E4A" transform="rotate(-30 115 145)"/>
  <ellipse cx="285" cy="140" rx="8" ry="5" fill="#6B9E4A" transform="rotate(30 285 140)"/>
  <!-- Spoon -->
  <line x1="260" y1="90" x2="280" y2="60" stroke="#C0A060" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="284" cy="55" rx="10" ry="7" fill="#C0A060" transform="rotate(-30 284 55)"/>
  <!-- Label -->
  <text x="200" y="270" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#5C1A6E">오디잼 만들기 체험</text>
</svg>