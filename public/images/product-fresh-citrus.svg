<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="10" y="10" width="380" height="280" rx="20" ry="20" fill="#F5E0B0"/>
  <!-- Pile of citrus fruits -->
  <!-- Bottom row -->
  <circle cx="160" cy="175" r="30" fill="#FF9800"/>
  <circle cx="160" cy="175" r="30" fill="#FFB040" opacity="0.4"/>
  <circle cx="220" cy="178" r="32" fill="#FFA000"/>
  <circle cx="220" cy="178" r="32" fill="#FFC050" opacity="0.4"/>
  <circle cx="275" cy="175" r="28" fill="#FF8C00"/>
  <circle cx="275" cy="175" r="28" fill="#FFB040" opacity="0.4"/>
  <!-- Top row -->
  <circle cx="185" cy="135" r="28" fill="#FFA800"/>
  <circle cx="185" cy="135" r="28" fill="#FFC860" opacity="0.4"/>
  <circle cx="245" cy="138" r="26" fill="#FF9000"/>
  <circle cx="245" cy="138" r="26" fill="#FFB850" opacity="0.4"/>
  <!-- Top fruit -->
  <circle cx="215" cy="100" r="24" fill="#FFB020"/>
  <circle cx="215" cy="100" r="24" fill="#FFD070" opacity="0.4"/>
  <!-- Leaves on top -->
  <ellipse cx="210" cy="78" rx="12" ry="6" fill="#4A8A2A" transform="rotate(-20 210 78)"/>
  <ellipse cx="222" cy="80" rx="10" ry="5" fill="#5A9A3A" transform="rotate(25 222 80)"/>
  <ellipse cx="180" cy="112" rx="10" ry="5" fill="#4A8A2A" transform="rotate(-15 180 112)"/>
  <!-- Small stem details -->
  <circle cx="215" cy="77" r="2" fill="#4A7A2A"/>
  <circle cx="185" cy="110" r="2" fill="#4A7A2A"/>
  <circle cx="160" cy="148" r="2" fill="#4A7A2A"/>
  <!-- Citrus texture dots -->
  <circle cx="150" cy="170" r="1" fill="#E88800" opacity="0.5"/>
  <circle cx="165" cy="165" r="1" fill="#E88800" opacity="0.5"/>
  <circle cx="170" cy="180" r="1" fill="#E88800" opacity="0.5"/>
  <circle cx="210" cy="172" r="1" fill="#E88800" opacity="0.5"/>
  <circle cx="225" cy="168" r="1" fill="#E88800" opacity="0.5"/>
  <!-- Half cut citrus -->
  <ellipse cx="310" cy="195" rx="22" ry="22" fill="#FFD060"/>
  <circle cx="310" cy="195" r="16" fill="#FFF0A0"/>
  <line x1="310" y1="179" x2="310" y2="211" stroke="#FFD060" stroke-width="1" opacity="0.6"/>
  <line x1="294" y1="195" x2="326" y2="195" stroke="#FFD060" stroke-width="1" opacity="0.6"/>
  <line x1="298" y1="183" x2="322" y2="207" stroke="#FFD060" stroke-width="1" opacity="0.6"/>
  <line x1="298" y1="207" x2="322" y2="183" stroke="#FFD060" stroke-width="1" opacity="0.6"/>
  <!-- Shadow -->
  <ellipse cx="210" cy="215" rx="80" ry="10" fill="#D4B870" opacity="0.3"/>
  <!-- Label -->
  <text x="200" y="270" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#B86800">신선한 감귤</text>
</svg>