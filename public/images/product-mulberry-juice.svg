<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="10" y="10" width="380" height="280" rx="20" ry="20" fill="#D8C0E8"/>
  <!-- Bottle body -->
  <rect x="165" y="100" width="70" height="130" rx="8" fill="#F0E8F5"/>
  <rect x="165" y="100" width="70" height="130" rx="8" stroke="#B090C0" stroke-width="2" fill="none"/>
  <!-- Bottle neck -->
  <rect x="183" y="55" width="34" height="50" rx="4" fill="#F0E8F5"/>
  <rect x="183" y="55" width="34" height="50" rx="4" stroke="#B090C0" stroke-width="2" fill="none"/>
  <!-- Cap -->
  <rect x="180" y="45" width="40" height="15" rx="4" fill="#5C1A6E"/>
  <!-- Purple juice inside -->
  <rect x="170" y="130" width="60" height="95" rx="6" fill="#6B2080" opacity="0.5"/>
  <rect x="186" y="85" width="28" height="50" rx="3" fill="#6B2080" opacity="0.4"/>
  <!-- Juice level wave -->
  <path d="M170 130 Q185 125 200 130 Q215 135 230 130" fill="#6B2080" opacity="0.5"/>
  <!-- Label -->
  <rect x="172" y="145" width="56" height="55" rx="5" fill="#FFFAF0"/>
  <rect x="172" y="145" width="56" height="55" rx="5" stroke="#B090C0" stroke-width="1" fill="none"/>
  <text x="200" y="164" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#5C1A6E">오디</text>
  <text x="200" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#5C1A6E">주스</text>
  <text x="200" y="192" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#8B6914">100% Natural</text>
  <!-- Decorative berries -->
  <circle cx="140" cy="170" r="5" fill="#4A1259"/>
  <circle cx="133" cy="164" r="4" fill="#5C1A6E"/>
  <circle cx="136" cy="176" r="4" fill="#6B2080"/>
  <circle cx="260" cy="168" r="5" fill="#4A1259"/>
  <circle cx="267" cy="162" r="4" fill="#5C1A6E"/>
  <circle cx="264" cy="174" r="4" fill="#6B2080"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="238" rx="45" ry="6" fill="#B090C0" opacity="0.3"/>
  <!-- Label -->
  <text x="200" y="270" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#5C1A6E">오디 주스</text>
</svg>