  <line x1="400" y1="260" x2="360" y2="200" stroke="#6B8E23" stroke-width="3"/>
  <line x1="400" y1="260" x2="440" y2="200" stroke="#6B8E23" stroke-width="3"/>
  <line x1="400" y1="300" x2="350" y2="240" stroke="#6B8E23" stroke-width="3"/>
  <line x1="400" y1="300" x2="450" y2="240" stroke="#6B8E23" stroke-width="3"/>
  <!-- Rice grains -->
  <ellipse cx="360" cy="195" rx="6" ry="10" fill="#DAA520" transform="rotate(-20 360 195)"/>
  <ellipse cx="345" cy="205" rx="6" ry="10" fill="#DAA520" transform="rotate(-30 345 205)"/>
  <ellipse cx="440" cy="195" rx="6" ry="10" fill="#DAA520" transform="rotate(20 440 195)"/>
  <ellipse cx="455" cy="205" rx="6" ry="10" fill="#DAA520" transform="rotate(30 455 205)"/>
  <ellipse cx="350" cy="235" rx="6" ry="10" fill="#DAA520" transform="rotate(-25 350 235)"/>
  <ellipse cx="335" cy="248" rx="6" ry="10" fill="#DAA520" transform="rotate(-35 335 248)"/>
  <ellipse cx="450" cy="235" rx="6" ry="10" fill="#DAA520" transform="rotate(25 450 235)"/>
  <ellipse cx="465" cy="248" rx="6" ry="10" fill="#DAA520" transform="rotate(35 465 248)"/>
  <!-- Ground -->
  <ellipse cx="400" cy="390" rx="60" ry="12" fill="#8B7355" opacity="0.4"/>
