<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="10" y="10" width="380" height="280" rx="20" ry="20" fill="#F5E8C0"/>
  <!-- Tree trunk -->
  <rect x="185" y="150" width="30" height="70" rx="5" fill="#8B6914"/>
  <!-- Tree canopy -->
  <ellipse cx="200" cy="110" rx="90" ry="70" fill="#5A8C3A"/>
  <ellipse cx="170" cy="120" rx="50" ry="45" fill="#6B9E4A"/>
  <ellipse cx="230" cy="115" rx="55" ry="48" fill="#6B9E4A"/>
  <ellipse cx="200" cy="90" rx="60" ry="40" fill="#7DB35A"/>
  <!-- Oranges on tree -->
  <circle cx="160" cy="100" r="12" fill="#FF8C00"/>
  <circle cx="160" cy="100" r="12" fill="#FFA030" opacity="0.6"/>
  <circle cx="230" cy="95" r="13" fill="#FF8C00"/>
  <circle cx="230" cy="95" r="13" fill="#FFA030" opacity="0.6"/>
  <circle cx="195" cy="75" r="11" fill="#FF8C00"/>
  <circle cx="195" cy="75" r="11" fill="#FFA030" opacity="0.6"/>
  <circle cx="245" cy="120" r="12" fill="#FF8C00"/>
  <circle cx="245" cy="120" r="12" fill="#FFA030" opacity="0.6"/>
  <circle cx="155" cy="130" r="11" fill="#FF8C00"/>
  <circle cx="155" cy="130" r="11" fill="#FFA030" opacity="0.6"/>
  <circle cx="210" cy="110" r="10" fill="#FF8C00"/>
  <!-- Small leaf details on oranges -->
  <ellipse cx="160" cy="88" rx="5" ry="3" fill="#4A7A2A"/>
  <ellipse cx="230" cy="82" rx="5" ry="3" fill="#4A7A2A"/>
  <ellipse cx="195" cy="64" rx="4" ry="3" fill="#4A7A2A"/>
  <!-- Ground -->
  <ellipse cx="200" cy="225" rx="120" ry="15" fill="#D4C490" opacity="0.5"/>
  <!-- Fallen oranges -->
  <circle cx="150" cy="220" r="9" fill="#FF8C00"/>
  <circle cx="250" cy="222" r="8" fill="#FFA030"/>
  <!-- Label -->
  <text x="200" y="275" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#B86800">감귤 따기 체험</text>
</svg>